<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VANGUARD // CSPM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        /* ── Base surfaces (pure black) ── */
        --bg:       #030304;
        --surface:  #07080a;
        --card:     #0c0d10;
        --border:   #1c1c20;

        /* ── Text ── */
        --accent:   #f0e8c0;
        --accent2:  #8a8070;
        --accent3:  #4a4535;

        /* ── Neon palette — electric yellow as primary ── */
        --cyan:     #ffe600;   /* electric yellow = primary accent */
        --magenta:  #ff3c00;   /* neon orange-red = danger / admin */
        --green:    #39ff14;   /* neon green */
        --yellow:   #ffe600;   /* alias */
        --red:      #ff2255;
        --orange:   #ff6b00;
        --blue:     #00cfff;
        --purple:   #bf5fff;

        /* ── Glows ── */
        --glow-cyan:    0 0 8px rgba(255,230,0,0.7),  0 0 24px rgba(255,230,0,0.25), 0 0 48px rgba(255,230,0,0.08);
        --glow-magenta: 0 0 8px rgba(255,60,0,0.7),   0 0 24px rgba(255,60,0,0.25);
        --glow-green:   0 0 8px rgba(57,255,20,0.7),  0 0 24px rgba(57,255,20,0.25);
        --glow-red:     0 0 8px rgba(255,34,85,0.7),  0 0 24px rgba(255,34,85,0.25);

        /* ── Fonts ── */
        --font-display: 'Orbitron', sans-serif;
        --font-ui:      'Rajdhani', sans-serif;
        --font-mono:    'JetBrains Mono', monospace;

        /* ── Theme-aware component tokens ── */
        --sidebar-border:    rgba(0,212,255,0.12);
        --nav-divider:       rgba(255,230,0,0.06);
        --nav-active-bg:     rgba(255,230,0,0.07);
        --nav-active-glow:   rgba(255,230,0,0.5);
        --admin-active-bg:   rgba(255,60,0,0.07);
        --admin-active-glow: rgba(255,60,0,0.5);
        --bottom-divider:    rgba(255,230,0,0.08);
        --role-admin-bg:     rgba(255,230,0,0.08);
        --role-admin-border: rgba(255,230,0,0.3);
        --role-super-bg:     rgba(255,60,0,0.1);
        --role-super-border: rgba(255,60,0,0.35);
      }

      html, body, #root {
        height: 100%;
        background: var(--bg);
        color: var(--accent);
      }

      body {
        font-family: var(--font-ui);
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
        /* Subtle yellow-tinted grid overlay */
        background-image:
          linear-gradient(rgba(255,230,0,0.018) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,230,0,0.018) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: rgba(255,230,0,0.5); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--cyan); box-shadow: var(--glow-cyan); }

      input, select, button { font-family: inherit; }
      input::placeholder { color: var(--accent3); }

      input:focus, select:focus {
        outline: none !important;
        border-color: var(--cyan) !important;
        box-shadow: 0 0 0 1px rgba(255,230,0,0.25) !important;
      }

      /* ── Animations ── */
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes neonPulse {
        0%, 100% { opacity: 1; text-shadow: var(--glow-cyan); }
        50%       { opacity: 0.7; text-shadow: none; }
      }

      @keyframes scanDown {
        0%   { transform: translateY(-100%); opacity: 0.6; }
        100% { transform: translateY(100vh); opacity: 0; }
      }

      @keyframes glitch {
        0%   { clip-path: inset(0 0 98% 0); transform: translate(-2px); }
        10%  { clip-path: inset(30% 0 60% 0); transform: translate(2px); }
        20%  { clip-path: inset(70% 0 10% 0); transform: translate(-1px); }
        30%  { clip-path: inset(0 0 98% 0); transform: translate(0); }
        100% { clip-path: inset(0 0 98% 0); transform: translate(0); }
      }

      @keyframes borderGlow {
        0%, 100% { border-color: var(--cyan); box-shadow: var(--glow-cyan); }
        50%       { border-color: rgba(255,230,0,0.3); box-shadow: none; }
      }

      @keyframes flicker {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
        20%, 24%, 55% { opacity: 0.3; }
      }

      @keyframes btnScan {
        0%   { left: -100%; }
        100% { left: 200%; }
      }

      @keyframes cornerBracket {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.4; }
      }

      @keyframes dataStream {
        0%   { background-position: 0 0; }
        100% { background-position: 0 100px; }
      }

      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-20px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      @keyframes pulseRing {
        0%   { transform: scale(1);   opacity: 0.8; }
        100% { transform: scale(2.2); opacity: 0; }
      }

      /* ── Neon button — animated scan sweep on hover ── */
      .neon-btn {
        position: relative;
        overflow: hidden;
        transition: box-shadow 0.2s, color 0.2s, border-color 0.2s;
      }
      .neon-btn::after {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 60%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,230,0,0.18), transparent);
        transform: skewX(-20deg);
        transition: none;
      }
      .neon-btn:hover {
        box-shadow: var(--glow-cyan);
        border-color: var(--cyan) !important;
      }
      .neon-btn:hover::after {
        animation: btnScan 0.55s ease forwards;
      }

      /* ── Neon card corner brackets ── */
      .neon-card {
        position: relative;
      }
      .neon-card::before,
      .neon-card::after {
        content: '';
        position: absolute;
        width: 12px; height: 12px;
        border-color: rgba(255,230,0,0.4);
        border-style: solid;
        animation: cornerBracket 3s ease-in-out infinite;
      }
      .neon-card::before {
        top: -1px; left: -1px;
        border-width: 2px 0 0 2px;
      }
      .neon-card::after {
        bottom: -1px; right: -1px;
        border-width: 0 2px 2px 0;
      }

      /* ── Pulse dot for status indicators ── */
      .pulse-dot {
        position: relative;
        display: inline-block;
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 6px rgba(57,255,20,0.8);
      }
      .pulse-dot::after {
        content: '';
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        border-radius: 50%;
        background: var(--green);
        animation: pulseRing 1.8s ease-out infinite;
      }

      /* ── Light mode overrides ── */
      [data-theme="light"] {
        /* Surfaces — clean neutral-cool whites */
        --bg:      #f0f4fa;
        --surface: #e2e8f4;
        --card:    #ffffff;
        --border:  #c8d2e4;

        /* Text — deep navy/slate, not harsh black */
        --accent:  #0d1526;
        --accent2: #3d4e6a;
        --accent3: #7a8ea8;

        /* Neons — shift to versions readable on light backgrounds */
        /* Yellow → deep amber-gold (readable as text AND as fill) */
        --cyan:    #c47f00;
        --yellow:  #c47f00;
        /* Green → forest green (dark enough on white) */
        --green:   #16a34a;
        /* Red stays readable */
        --red:     #dc2626;
        /* Orange → burnt orange */
        --orange:  #c2410c;
        /* Blue → strong blue */
        --blue:    #1a6db8;
        /* Purple stays */
        --purple:  #7c3aed;
        /* Magenta → crimson */
        --magenta: #c0152a;

        /* Glows — soft, warm shadows instead of neon halos */
        --glow-cyan:    0 2px 8px rgba(196,127,0,0.25),  0 0 20px rgba(196,127,0,0.10);
        --glow-magenta: 0 2px 8px rgba(192,21,42,0.25),  0 0 20px rgba(192,21,42,0.10);
        --glow-green:   0 2px 8px rgba(22,163,74,0.25),  0 0 20px rgba(22,163,74,0.10);
        --glow-red:     0 2px 8px rgba(220,38,38,0.25),  0 0 20px rgba(220,38,38,0.10);

        /* Component tokens for light mode */
        --sidebar-border:    rgba(0,0,0,0.08);
        --nav-divider:       rgba(0,0,0,0.06);
        --nav-active-bg:     rgba(196,127,0,0.09);
        --nav-active-glow:   rgba(196,127,0,0.45);
        --admin-active-bg:   rgba(192,21,42,0.07);
        --admin-active-glow: rgba(192,21,42,0.45);
        --bottom-divider:    rgba(0,0,0,0.07);
        --role-admin-bg:     rgba(196,127,0,0.10);
        --role-admin-border: rgba(196,127,0,0.35);
        --role-super-bg:     rgba(192,21,42,0.08);
        --role-super-border: rgba(192,21,42,0.30);
      }

      [data-theme="light"] body {
        /* Subtle dot grid instead of yellow lines */
        background-image: radial-gradient(circle, rgba(100,120,160,0.12) 1px, transparent 1px);
        background-size: 28px 28px;
      }

      /* Scrollbar in light mode */
      [data-theme="light"] ::-webkit-scrollbar-track { background: var(--bg); }
      [data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(196,127,0,0.35); }
      [data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

      /* Neon button sweep — amber tint in light mode */
      [data-theme="light"] .neon-btn::after {
        background: linear-gradient(90deg, transparent, rgba(196,127,0,0.15), transparent);
      }

      /* Card corner brackets — amber in light mode */
      [data-theme="light"] .neon-card::before,
      [data-theme="light"] .neon-card::after {
        border-color: rgba(196,127,0,0.35);
      }

      /* Active nav pulse — amber */
      [data-theme="light"] .nav-btn.active::before {
        background: var(--cyan);
        box-shadow: 0 0 8px rgba(196,127,0,0.5);
      }

      /* Input focus ring — amber */
      [data-theme="light"] input:focus,
      [data-theme="light"] select:focus {
        border-color: var(--cyan) !important;
        box-shadow: 0 0 0 2px rgba(196,127,0,0.18) !important;
      }

      /* Cards get a clean shadow instead of neon glow */
      [data-theme="light"] .neon-card {
        box-shadow: 0 1px 4px rgba(13,21,38,0.08), 0 4px 16px rgba(13,21,38,0.06);
      }

      /* ── Sidebar nav button animated left border ── */
      .nav-btn {
        position: relative;
        overflow: hidden;
        transition: background 0.15s, color 0.15s;
      }
      .nav-btn.active::before {
        content: '';
        position: absolute;
        left: 0; top: 0;
        width: 2px; height: 100%;
        background: var(--cyan);
        box-shadow: 0 0 8px rgba(255,230,0,0.6);
        animation: neonPulse 2s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
